name: Mutual Fund RAG Daily Update

on:
  schedule:
    # Runs at 10:00 AM IST (04:30 AM UTC) every day
    - cron: '30 4 * * *'
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 sentence-transformers faiss-cpu pandas pydantic python-dotenv groq APScheduler
          
      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      - name: Run Update Pipeline (Phase 1 and Phase 2)
        run: |
          cd phase7_scheduler
          python scheduler.py
          
      - name: Commit updated index and data back to repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add phase2_knowledge_base/mutual_funds.index
          git add phase2_knowledge_base/metadata.pkl
          git add phase1_data_acquisition/mutual_fund_data.csv
          git commit -m "Automated nightly data and FAISS index update" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
